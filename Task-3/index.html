<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern Glassmorphism Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-decorations">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <div class="calculator-container" id="calculatorContainer">
        
        <div class="history-panel" id="historyPanel">
            <div class="history-header">
                <h3>History</h3>
                <div>
                    <button class="clear-history" id="clearHistoryBtn">Clear</button>
                    <button class="clear-history" id="closeHistoryBtn" style="margin-left: 15px;">Close</button>
                </div>
            </div>
            <div class="history-list" id="historyList"></div>
        </div>

        <div class="display">
            <div class="top-bar">
                <button class="history-toggle" id="historyToggleBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="12 8 12 12 14 14"></polyline>
                        <circle cx="12" cy="12" r="10"></circle>
                    </svg>
                </button>
                <div class="deg-rad-indicator" id="angleModeIndicator">RAD</div>
            </div>
            <div class="previous-operand" id="previousOperand"></div>
            <div class="current-operand" id="currentOperand">0</div>
        </div>

        <div class="keypad-wrapper" id="keypadWrapper">
            <!-- Basic Keypad -->
            <div class="keypad basic-keypad" id="basicKeypad">
                <button class="btn btn-action" data-action="clear">AC</button>
                <button class="btn btn-action" data-action="toggle-sign">+/-</button>
                <button class="btn btn-action" data-action="percent">%</button>
                <button class="btn btn-operator" data-operation="÷">÷</button>

                <button class="btn btn-number" data-number="7">7</button>
                <button class="btn btn-number" data-number="8">8</button>
                <button class="btn btn-number" data-number="9">9</button>
                <button class="btn btn-operator" data-operation="×">×</button>

                <button class="btn btn-number" data-number="4">4</button>
                <button class="btn btn-number" data-number="5">5</button>
                <button class="btn btn-number" data-number="6">6</button>
                <button class="btn btn-operator" data-operation="-">−</button>

                <button class="btn btn-number" data-number="1">1</button>
                <button class="btn btn-number" data-number="2">2</button>
                <button class="btn btn-number" data-number="3">3</button>
                <button class="btn btn-operator" data-operation="+">+</button>

                <button class="btn btn-number btn-zero" data-number="0">0</button>
                <button class="btn btn-number" data-number=".">.</button>
                <button class="btn btn-operator btn-equals" data-action="equals">=</button>
                <button class="btn btn-action btn-small span-4 switch-mode-btn" id="switchToSciBtn">Scientific Mode ↓</button>
            </div>

            <!-- Scientific Keypad -->
            <div class="keypad scientific-keypad" id="scientificKeypad">
                <button class="btn btn-sci btn-small" data-sci="sin">sin</button>
                <button class="btn btn-sci btn-small" data-sci="cos">cos</button>
                <button class="btn btn-sci btn-small" data-sci="tan">tan</button>
                <button class="btn btn-sci btn-small" data-sci="log">log</button>

                <button class="btn btn-sci btn-small" data-sci="ln">ln</button>
                <button class="btn btn-sci btn-small" data-sci="sqrt">√</button>
                <button class="btn btn-sci btn-small" data-sci="pow">xʸ</button>
                <button class="btn btn-sci btn-small" data-sci="pi">π</button>

                <button class="btn btn-sci btn-small" data-sci="e">e</button>
                <button class="btn btn-sci btn-small" data-sci="square">x²</button>
                <button class="btn btn-sci btn-small" data-sci="inv">1/x</button>
                <button class="btn btn-sci btn-small" data-sci="fact">x!</button>

                <button class="btn btn-sci btn-small" data-sci="exp">exp</button>
                <button class="btn btn-action btn-small" data-action="toggle-angle" id="toggleAngleBtn">RAD</button>
                <button class="btn btn-number btn-small" data-number="(">(</button>
                <button class="btn btn-number btn-small" data-number=")">)</button>
                
                <button class="btn btn-action btn-small span-4 switch-mode-btn" id="switchToBasicBtn">Basic Mode ↑</button>
            </div>
        </div>
        
        <div class="swipe-indicator">
            <div class="dot active" id="dotBasic"></div>
            <div class="dot" id="dotSci"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
